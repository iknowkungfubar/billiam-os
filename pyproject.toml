[build-system]
requires = [
    "setuptools>=83.0.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "billiam-os"
version = "1.1.0"
description = "AI-Powered Linux OS Layer — Voice-controllable, agent-driven personal digital assistant"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "Billiam OS Contributors" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Topic :: System :: Systems Administration",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "openai>=1.0.0,<3.0.0",
    "pyyaml>=6.0,<7.0",
    "requests>=2.28,<3.0",
]

[project.license]
text = "GPL-3.0"

[project.optional-dependencies]
voice = [
    "edge-tts>=7.0.0,<8.0.0",
    "faster-whisper>=1.0.0,<2.0.0",
]

[project.scripts]
billiam = "core.cli:main"

[project.urls]
Homepage = "https://github.com/iknowkungfubar/billiam-os"
Repository = "https://github.com/iknowkungfubar/billiam-os.git"

[tool.ruff]
line-length = 100
target-version = "py310"

