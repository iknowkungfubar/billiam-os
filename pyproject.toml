[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "A002",
    "PERF102",
    "PTH100",
    "PTH101",
    "S101",
    "S108",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = [
    "tests",
]
addopts = "-v --tb=short -q"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = [
    "core",
]
omit = [
    "tests/*",
]

[tool.coverage.report]
fail_under = 60
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "raise AssertionError",
    "raise NotImplementedError",
    "raise ImportError",
    "return NotImplemented",
    "@overload",
]

[tool.mypy]
python_version = "3.12"
strict = true
exclude = [
    "tests/",
]
ignore_missing_imports = true
