name: Billiam
run-name: Billiam OS CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check core/ tests/ --no-cache

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy core/ --install-types --non-interactive --ignore-missing-imports 2>&1 | tail -5

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check core/ tests/ --no-cache

      - name: Test with pytest (coverage min 70%)
        run: |
          pip install pytest pytest-cov
          python -m pytest tests/ -q --cov=core --cov-report=term --cov-fail-under=70

      - name: Check imports
        run: |
          python -c "
          from core.billiam import BILLIAM_PROFILE
          from core.memory import AssistantMemoryLayer
          from core.sandbox import SecureExecutionSandbox
          from core.config import load_config
          from core.ai_core import AICore
          import tempfile, os
          d = tempfile.mkdtemp()
          mp = os.path.join(d, 'mem.json')
          c = AICore(memory_path=mp)
          assert c.assistant_name == 'Billiam'
          import shutil; shutil.rmtree(d)
          print('All imports OK')
          "

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
        continue-on-error: true
